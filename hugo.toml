baseURL = 'https://zz-doupe.com'
languageCode = 'en-us'
title = 'ZZ doupě'
theme = 'pehtheme-hugo'

summaryLength = 20
googleAnalytics = 'G-MEASUREMENT_ID'   # <- replace with your GA-4 ID
disqusShortname = ''                   # <- replace with your Disqus shortname

[params]
  mainSections = 'posts'

[author]
  name   = 'Zbyšek Zapadlík'
  avatar = '/images/avatar.jpg'

[pagination]
  pagerSize = 6

[menu]
  [[menu.main]]
    name    = 'Home'
    pageRef = '/'
    weight  = 10
  [[menu.main]]
    name    = 'Articles'
    pageRef = '/posts'
    weight  = 15
  [[menu.main]]
    name    = 'Tags'
    pageRef = '/tags'
    weight  = 20
  [[menu.main]]
    name    = 'About me'
    pageRef = '/pages/about'
    weight  = 25

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[module]
  [module.hugoVersion]
    extended = false
    min      = "0.116.0"
  [[module.mounts]]
    source = 'assets'
    target = 'static'
